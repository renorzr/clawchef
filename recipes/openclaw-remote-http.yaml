version: "1"
name: "openclaw-remote-http-demo"

params:
  project_name:
    default: "remote-http-demo"
  openclaw_version:
    default: "2026.2.9"

openclaw:
  version: "${openclaw_version}"
  install: "never"

workspaces:
  - name: "${project_name}"
    files:
      - path: "README.md"
        overwrite: true
        content: |
          # ${project_name}
          Managed by clawchef remote HTTP provider.

agents:
  - workspace: "${project_name}"
    name: "chef-openai"
    model: "openai/gpt-5.3-codex"

conversations:
  - workspace: "${project_name}"
    agent: "chef-openai"
    run: true
    messages:
      - content: "Say hello in one sentence."
        expect:
          contains:
            - "hello"
