version: "1"
name: "openclaw-from-zero"

params:
  project_name:
    default: "from-zero-demo"
  openclaw_version:
    default: "2026.2.9"
  openai_api_key:
    required: true

openclaw:
  provider: "command"
  bin: "openclaw"
  version: "${openclaw_version}"
  install: "never"
  bootstrap:
    auth_choice: "openai-api-key"
    openai_api_key: "${openai_api_key}"
    mode: "local"
    flow: "quickstart"
    accept_risk: true
    non_interactive: true
    skip_channels: true
    skip_skills: true
    skip_health: true
    skip_ui: true
    skip_daemon: true

workspaces:
  - name: "${project_name}"

agents:
  - workspace: "${project_name}"
    name: "chef-openai"
    model: "openai/gpt-5.3-codex"

conversations:
  - workspace: "${project_name}"
    agent: "chef-openai"
    run: true
    messages:
      - content: "Say hello in one sentence."
        expect:
          contains:
            - "hello"
