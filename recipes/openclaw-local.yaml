version: "1"
name: "openclaw-local-demo"

params:
  project_name:
    default: "openclaw-local-demo"
  openclaw_version:
    default: "2026.2.9"
  llm_api_key:
    required: true
  telegram_bot_token:
    required: true
  user_name:
    required: true
  agent_name:
    required: true

openclaw:
  bin: "openclaw"
  version: "${openclaw_version}"
  install: "never"
  bootstrap:
    auth_choice: "openai-api-key"
    llm_api_key: "${llm_api_key}"
    mode: "local"
    flow: "quickstart"
    accept_risk: true
    non_interactive: true
    skip_channels: true
    skip_skills: true
    skip_health: true
    skip_ui: true
    skip_daemon: true

workspaces:
  - name: "${project_name}"
    files:
      - path: "README.md"
        overwrite: true
        content: |
          # ${project_name}
          Generated by clawchef.

agents:
  - workspace: "${project_name}"
    name: "chef-openai"
    model: "openai/gpt-5.3-codex"

channels:
  - channel: "telegram"
    token: "${telegram_bot_token}"
    account: "default"

conversations:
  - workspace: "${project_name}"
    agent: "chef-openai"
    run: true
    messages:
      - content: "I'm ${user_name}, you're ${agent_name}."
        expect:
          contains:
            - "${user_name}"
