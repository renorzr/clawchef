version: "1"
name: "demo-run"

params:
  project_name:
    default: "demo-app"
  openclaw_version:
    default: "1.3.2"
  telegram_bot_token:
    default: "mock-telegram-token"

openclaw:
  version: "${openclaw_version}"
  install: "auto"

workspaces:
  - name: "${project_name}"
    files:
      - path: "README.md"
        overwrite: true
        content: |
          # ${project_name}
          Generated by clawchef.

channels:
  - channel: "telegram"
    token: "${telegram_bot_token}"
    account: "default"

agents:
  - workspace: "${project_name}"
    name: "planner"
    model: "gpt-5.3-codex"
    skills: ["repo-explore", "code-review"]

conversations:
  - workspace: "${project_name}"
    agent: "planner"
    run: true
    messages:
      - content: "You are a strict software planning assistant."
      - content: "Please provide a 3-step plan."
        expect:
          contains:
            - "mock-reply"
          regex:
            - "[Pp]lan"
