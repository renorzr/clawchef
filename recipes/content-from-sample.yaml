version: "1"
name: "content-from-sample"

openclaw:
  version: "1.3.2"
  install: "auto"

workspaces:
  - name: "content-from-demo"

agents:
  - workspace: "content-from-demo"
    name: "planner"
    model: "gpt-5.3-codex"

files:
  - workspace: "content-from-demo"
    path: "README.md"
    overwrite: true
    content_from: "./snippets/readme-template.md"
