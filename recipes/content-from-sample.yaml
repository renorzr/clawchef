version: "1"
name: "content-from-sample"

params:
  project_name:
    default: "content-from-demo"
  agent_name:
    default: "planner"

openclaw:
  version: "1.3.2"
  install: "auto"

workspaces:
  - name: "${project_name}"
    files:
      - path: "README.md"
        overwrite: true
        content_from: "./snippets/readme-template.md"

agents:
  - workspace: "${project_name}"
    name: "${agent_name}"
    model: "gpt-5.3-codex"
